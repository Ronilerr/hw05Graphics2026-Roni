<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>HW5 - Bowling Alley</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }

      #ui-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }

      #scorecard-container,
      #controls-container {
        position: absolute;
        pointer-events: auto;
        background: rgba(20, 20, 35, 0.88);
        color: #f5f5f5;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 12px 16px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      }

      #scorecard-container {
        top: 16px;
        right: 16px;
        min-width: 320px;
      }

      #scorecard-container h2,
      #controls-container h2 {
        margin: 0 0 10px;
        font-size: 16px;
        color: #ffffff;
      }

      #scorecard-grid {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 4px;
      }

      .score-frame {
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        padding: 6px 4px;
        text-align: center;
        font-size: 11px;
        min-height: 42px;
        background: rgba(255, 255, 255, 0.04);
      }

      .score-frame span {
        display: block;
        color: #aaaaaa;
        margin-bottom: 4px;
      }

      #controls-container {
        bottom: 16px;
        left: 16px;
        max-width: 260px;
      }

      #controls-container p {
        margin: 6px 0;
        font-size: 14px;
        line-height: 1.4;
      }

      .placeholder-note {
        color: #b0b0b0;
        font-size: 12px;
        font-style: italic;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="ui-overlay">
      <div id="scorecard-container">
        <h2>Bowling Scorecard</h2>
        <div id="scorecard-grid">
          <div class="score-frame"><span>1</span>--</div>
          <div class="score-frame"><span>2</span>--</div>
          <div class="score-frame"><span>3</span>--</div>
          <div class="score-frame"><span>4</span>--</div>
          <div class="score-frame"><span>5</span>--</div>
          <div class="score-frame"><span>6</span>--</div>
          <div class="score-frame"><span>7</span>--</div>
          <div class="score-frame"><span>8</span>--</div>
          <div class="score-frame"><span>9</span>--</div>
          <div class="score-frame"><span>10</span>--</div>
        </div>
        <p class="placeholder-note">Score tracking will be added in HW06.</p>
      </div>

      <div id="controls-container">
        <h2>Controls</h2>
        <p><strong>O</strong> - Toggle orbit camera</p>
        <p class="placeholder-note">Aiming, power meter, and ball release will be added in HW06.</p>
      </div>
    </div>

    <script src="src/hw5.js" type="module"></script>
  </body>
</html>
